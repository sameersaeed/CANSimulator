name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test 
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure CMake (${{ matrix.build_type }})
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run unit tests
        run: cd build && ctest --output-on-failure

  lint:
    name: Lint (clang-tidy)
    runs-on: ubuntu-22.04
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy cmake build-essential

      - name: Generate compile_commands.json
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DBUILD_TESTS=OFF

      - name: Run clang-tidy on src/
        run: |
          clang-tidy \
            -p build \
            --checks='-*,clang-analyzer-*,modernize-*,performance-*,readability-*' \
            src/pid_handler.cpp \
            src/simulator.cpp \
            || true  # advisory, doesnt cause failure
